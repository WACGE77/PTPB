<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDP测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button.connect {
            background-color: #007bff;
            color: white;
        }
        button.send {
            background-color: #28a745;
            color: white;
        }
        button.disconnect {
            background-color: #dc3545;
            color: white;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
        }
        .controls {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RDP WebSocket连接测试</h1>
        
        <div class="status info" id="status">
            准备连接RDP服务...
        </div>
        
        <div class="controls">
            <button class="connect" onclick="connect()">连接RDP</button>
            <button class="disconnect" onclick="disconnect()" disabled>断开连接</button>
        </div>
        
        <div class="controls">
            <button class="send" onclick="sendResize()">发送调整窗口大小命令</button>
            <button class="send" onclick="sendMouseEvent()">发送鼠标事件</button>
            <button class="send" onclick="sendKeyboardEvent()">发送键盘事件</button>
        </div>
        
        <h3>消息日志</h3>
        <textarea id="log" readonly></textarea>
    </div>
    
    <script>
        let ws = null;
        
        function log(message) {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logElement.value += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function updateStatus(message, type) {
            const statusElement = document.getElementById('status');
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
        }
        
        function connect() {
            // WebSocket URL for RDP connection
            const token = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzg2NzExMjA3LCJpYXQiOjE3Njk0MzEyMDcsImp0aSI6ImI5ZDc1ODdmM2EyZDRkYzdiYzI3OGVhNmM0OGRlM2I3IiwidXNlcl9pZCI6IjEifQ.ST8ZdChpXpyXX1WUfIr0OJhSxAbI-rE32suJoa4ngwE";
            const resource_id = "1";
            const voucher_id = "1";
            const resolution = "1024x768";
            const color_depth = "16";
            const enable_clipboard = "true";
            
            const wsUrl = `ws://127.0.0.1:8000/api/terminal/rdp/?resource=${resource_id}&voucher=${voucher_id}&token=${token}&resolution=${resolution}&color_depth=${color_depth}&enable_clipboard=${enable_clipboard}`;
            
            log(`正在连接: ${wsUrl}`);
            updateStatus('正在连接RDP服务...', 'info');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                log('连接成功！');
                updateStatus('RDP连接成功', 'success');
                document.querySelector('.connect').disabled = true;
                document.querySelector('.disconnect').disabled = false;
            };
            
            ws.onmessage = function(event) {
                log(`收到消息: ${event.data}`);
            };
            
            ws.onclose = function(event) {
                log(`连接关闭: ${event.code} ${event.reason}`);
                updateStatus('RDP连接已关闭', 'info');
                document.querySelector('.connect').disabled = false;
                document.querySelector('.disconnect').disabled = true;
                ws = null;
            };
            
            ws.onerror = function(error) {
                log(`连接错误: ${error}`);
                updateStatus('RDP连接错误', 'error');
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        function sendResize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const resizeCommand = JSON.stringify({"type": 1, "data": {"cols": 1024, "rows": 768}});
                ws.send(resizeCommand);
                log(`发送调整窗口大小命令: ${resizeCommand}`);
            } else {
                log('连接未建立，无法发送命令');
            }
        }
        
        function sendMouseEvent() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const mouseCommand = JSON.stringify({"type": 2, "data": {"event": "mouse", "x": 100, "y": 100, "button": "left", "action": "down"}});
                ws.send(mouseCommand);
                log(`发送鼠标事件: ${mouseCommand}`);
            } else {
                log('连接未建立，无法发送命令');
            }
        }
        
        function sendKeyboardEvent() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const keyboardCommand = JSON.stringify({"type": 2, "data": {"event": "keyboard", "key": "Ctrl", "action": "down"}});
                ws.send(keyboardCommand);
                log(`发送键盘事件: ${keyboardCommand}`);
            } else {
                log('连接未建立，无法发送命令');
            }
        }
    </script>
</body>
</html>
